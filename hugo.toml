baseURL = "https://musclelove-777.github.io/fukugyo-hyakka/"
googleAnalytics = "G-CSFVD34MKK"
languageCode = "ja"
defaultContentLanguage = "ja"
title = "副業ハック | 月5万円から始めるお金の稼ぎ方完全ガイド"
theme = "PaperMod"
paginate = 20

[params]
  env = "production"
  description = "副業・お金の稼ぎ方を完全網羅。初心者向けの始め方からフリーランス独立まで、月5万円〜100万円を目指すロードマップを紹介"
  author = "副業ハック編集部"
  defaultTheme = "light"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowToc = true
  TocOpen = true
  comments = false
  canonicalURL = true
  keywords = ["副業 おすすめ", "副業 始め方", "お金 稼ぐ方法", "在宅ワーク", "フリーランス", "投資 初心者", "アフィリエイト 始め方", "不労所得", "せどり", "副業 ランキング"]

  [params.homeInfoParams]
    Title = "副業ハック"
    Content = "月5万円から始めるお金の稼ぎ方完全ガイド。初心者向けの副業からフリーランス独立まで、あなたに合った稼ぎ方が見つかる。"

  [[params.socialIcons]]
    name = "x-twitter"
    url = "https://x.com/MuscleGirlLove7"

[params.cover]
  hidden = false
  hiddenInList = false
  hiddenInSingle = true

[sitemap]
  changefreq = "daily"
  priority = 0.7

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

